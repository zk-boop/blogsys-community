# 数据库配置
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blog_sys?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${UPLOAD_DIR:./uploads}
file.avatar-dir=${AVATAR_DIR:./uploads/avatars}
file.cover-dir=${COVER_DIR:./uploads/covers}

# Session配置
server.servlet.session.timeout=3600
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=${SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.max-age=3600
server.servlet.session.cookie.name=BLOGSESSION
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=never
spring.session.jdbc.table-name=SPRING_SESSION
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:session-schema.sql
spring.sql.init.continue-on-error=false

# 服务器配置
server.port=${SERVER_PORT:8080}

# Jackson配置
spring.jackson.mapper.accept-case-insensitive-enums=true

# Comma-separated origins allowed to send credentialed browser requests.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:8080,http://127.0.0.1:8081,http://127.0.0.1:8080}
